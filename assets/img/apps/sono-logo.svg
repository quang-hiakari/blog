<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100" height="100">
  <!-- App icon background with subtle gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B3E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="pageLeft">
      <rect x="13" y="19" width="29" height="62" rx="2"/>
    </clipPath>
    <clipPath id="pageRight">
      <rect x="58" y="19" width="29" height="62" rx="2"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- Left page (debts) -->
  <rect x="13" y="19" width="29" height="62" rx="2" fill="#1E293B" stroke="#2D3F5B" stroke-width="0.5"/>

  <!-- Right page (settled/payments) -->
  <rect x="58" y="19" width="29" height="62" rx="2" fill="#1E293B" stroke="#2D3F5B" stroke-width="0.5"/>

  <!-- Spine (glowing blue) -->
  <rect x="39" y="15" width="22" height="70" rx="4" fill="url(#spineGrad)" filter="url(#glow)"/>
  <!-- Spine highlight streak -->
  <rect x="40" y="15" width="5" height="70" rx="3" fill="#60A5FA" opacity="0.35"/>

  <!-- Left page: debt ledger lines (red = owed) -->
  <line x1="19" y1="33" x2="37" y2="33" stroke="#F87171" stroke-width="1.8" stroke-linecap="round" clip-path="url(#pageLeft)"/>
  <line x1="19" y1="43" x2="37" y2="43" stroke="#F87171" stroke-width="1.8" stroke-linecap="round" clip-path="url(#pageLeft)"/>
  <line x1="19" y1="53" x2="34" y2="53" stroke="#94A3B8" stroke-width="1.2" stroke-linecap="round" clip-path="url(#pageLeft)"/>
  <line x1="19" y1="62" x2="30" y2="62" stroke="#94A3B8" stroke-width="1.2" stroke-linecap="round" clip-path="url(#pageLeft)"/>
  <!-- Divider line -->
  <line x1="19" y1="69" x2="37" y2="69" stroke="#334155" stroke-width="0.6" clip-path="url(#pageLeft)"/>

  <!-- Right page: settled items (green = paid) -->
  <line x1="63" y1="33" x2="81" y2="33" stroke="#4ADE80" stroke-width="1.8" stroke-linecap="round" clip-path="url(#pageRight)"/>
  <line x1="63" y1="43" x2="76" y2="43" stroke="#94A3B8" stroke-width="1.2" stroke-linecap="round" clip-path="url(#pageRight)"/>

  <!-- Checkmark on right page -->
  <polyline points="64,57 70,64 81,51"
    stroke="#4ADE80" stroke-width="2.5" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    clip-path="url(#pageRight)"/>
</svg>
